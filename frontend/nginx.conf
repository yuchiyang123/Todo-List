# Cloudflare Tunnel (and similar reverse proxies) terminate TLS at the edge
# and forward to this container over plain HTTP, but they set their own
# X-Forwarded-Proto reflecting what the real visitor used. Trust that value
# when present; only fall back to this connection's own scheme (plain HTTP)
# for direct/local access without a proxy in front.
map $http_x_forwarded_proto $effective_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Mini-SSO must already be running and reachable here (see README).
    # host.docker.internal resolves to the Docker host on Windows/Mac by
    # default; on Linux add `extra_hosts: host.docker.internal:host-gateway`.
    location /api/auth/ {
        proxy_pass http://host.docker.internal:12080/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    # POST /api/auth (login) has no trailing segment, so it needs its own exact match.
    location = /api/auth {
        proxy_pass http://host.docker.internal:12080/api/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    # Mini-SSO's own redirects (e.g. finishing the OAuth callback) generate
    # paths like /api/Auth/... (capital A) rather than /api/auth/... — added
    # purely alongside the two blocks above (which stay exactly as before for
    # the lowercase paths our own frontend always uses) so that case doesn't
    # get missed and fall through to the SPA fallback below.
    location ~ ^/api/Auth/ {
        proxy_pass http://host.docker.internal:12080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    location /api/todos/ {
        proxy_pass http://todo-api:8080/api/todos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    location = /api/todos {
        proxy_pass http://todo-api:8080/api/todos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    # Google/GitHub OAuth callback paths (Mini-SSO's CallbackPath). These must
    # stay on this same origin so the "token"/"XSRF-TOKEN" cookies Mini-SSO
    # sets end up scoped to this domain, not Mini-SSO's own — otherwise the
    # session set during the OAuth round-trip wouldn't be visible back here.
    location /signin-google {
        proxy_pass http://host.docker.internal:12080/signin-google;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    location /signin-github {
        proxy_pass http://host.docker.internal:12080/signin-github;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $effective_scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
